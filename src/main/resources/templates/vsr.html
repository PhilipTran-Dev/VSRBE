<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let audioCtx = null;
    let audioUnlocked = false;

    function getAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
    }

    async function unlockAudio() {
        if (audioUnlocked) return;
        try {
            const ctx = getAudioContext();
            if (ctx.state === 'suspended') {
                await ctx.resume();
            }
            const buf = ctx.createBuffer(1, 1, 22050);
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start(0);
            audioUnlocked = true;
            console.log('[Audio] AudioContext unlocked, state:', ctx.state);
        } catch(e) {
            console.warn('[Audio] unlock error:', e);
        }
    }
</script>

<!-- ================================================================
     CAMERA + DETECT
     ================================================================ -->
<script>
    const camVideo      = document.getElementById('cam-video');
    const camCanvas     = document.getElementById('cam-canvas');
    const camCtx        = camCanvas.getContext('2d');
    const captureCanvas = document.getElementById('captureCanvas');
    const camLog        = document.getElementById('cam-log');
    const camBtn        = document.getElementById('cam-btn');
    const fpsLabel      = document.getElementById('fps-label');

    const audioCache = {};
    let fpsCount = 0;
    setInterval(() => { fpsLabel.textContent = fpsCount + ' FPS'; fpsCount = 0; }, 1000);

    function camlog(msg, cls = '') {
        const line = document.createElement('div');
        if (cls) line.className = cls;
        line.textContent = '› ' + msg;
        camLog.appendChild(line);
        camLog.scrollTop = camLog.scrollHeight;
        while (camLog.children.length > 30) camLog.removeChild(camLog.firstChild);
    }

    // ── PHÁT ÂM THANH ────────────────────────────────────────────
    function playSound(soundFile) {
        if (!audioCache[soundFile]) {
            const a = new Audio('/api/sounds/' + soundFile);
            a.preload = 'auto';
            audioCache[soundFile] = a;
        }
        const audio = audioCache[soundFile];
        audio.currentTime = 0;

        const ctx = getAudioContext();
        const doPlay = () => {
            audio.play()
                .then(() => camlog('Sound: ' + soundFile, 'ok'))
                .catch(e => {
                    camlog('Audio Error: ' + e.message, 'err');
                    if ('speechSynthesis' in window) {
                        const u = new SpeechSynthesisUtterance(soundFile.replace('.mp3', ''));
                        u.lang = 'vi-VN';
                        window.speechSynthesis.cancel();
                        window.speechSynthesis.speak(u);
                    }
                });
        };

        if (ctx.state === 'suspended') {
            ctx.resume().then(doPlay);
        } else {
            doPlay();
        }
    }

    // ── VẼ BOUNDING BOX ──────────────────────────────────────────
    function drawBoxes(detections, fw, fh) {
        camCanvas.width  = fw;
        camCanvas.height = fh;
        camCtx.clearRect(0, 0, fw, fh);
        detections.forEach(d => {
            const {x1, y1, x2, y2} = d.box;
            const pct  = Math.round(d.confidence * 100);
            const text = d.label + ' ' + pct + '%';

            camCtx.strokeStyle = '#00ff00';
            camCtx.lineWidth   = 3;
            camCtx.strokeRect(x1, y1, x2 - x1, y2 - y1);

            camCtx.font = 'bold 15px monospace';
            const tw = camCtx.measureText(text).width;
            camCtx.fillStyle = '#00ff00';
            camCtx.fillRect(x1, y1 - 22, tw + 12, 22);
            camCtx.fillStyle = '#000';
            camCtx.fillText(text, x1 + 6, y1 - 6);
        });
    }

    // ── GỬI FRAME LÊN SERVER ─────────────────────────────────────
    function startSending() {
        camlog('Camera: ' + camVideo.videoWidth + 'x' + camVideo.videoHeight + ' — Đang nhận diện...', 'ok');
        let isSending = false;

        setInterval(() => {
            if (camVideo.videoWidth === 0 || isSending) return;

            captureCanvas.width  = 640;
            captureCanvas.height = 480;
            captureCanvas.getContext('2d').drawImage(camVideo, 0, 0, 640, 480);

            captureCanvas.toBlob(blob => {
                if (!blob) return;
                isSending = true;
                const form = new FormData();
                form.append('frame', blob, 'frame.jpg');

                fetch('/api/detect', { method: 'POST', body: form })
                    .then(r => r.json())
                    .then(data => {
                        fpsCount++;
                        if (data.detections && data.detections.length > 0) {
                            drawBoxes(data.detections, 640, 480);
                            data.detections.forEach(d => {
                                const pct = Math.round(d.confidence * 100);
                                camlog('Signal: ' + d.label + ' (' + pct + '%) alert=' + d.shouldAlert, 'det');
                                if (d.shouldAlert) playSound(d.soundFile);
                            });
                        } else {
                            camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);
                        }
                    })
                    .catch(e => camlog('ERROR ' + e.message, 'err'))
                    .finally(() => { isSending = false; });

            }, 'image/jpeg', 0.95);
        }, 600);
    }

    // ── BẮT ĐẦU CAMERA ───────────────────────────────────────────
    async function startCamera() {
        camBtn.style.display = 'none';

        await unlockAudio();
        camlog('Audio context is on ready', 'ok');

        camlog('require permission from device');
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { ideal: 'environment' } },
                audio: false
            });
            camlog('Behind Camera is ok', 'ok');
        } catch (e) {
            camlog('Thử camera mặc định...');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                camlog('✅ Camera OK', 'ok');
            } catch (e2) {
                camlog('❌ ' + e2.message, 'err');
                camBtn.style.display = 'block';
                return;
            }
        }

        camVideo.srcObject = stream;
        try {
            await camVideo.play();
            camlog('Camera Running!', 'ok');
        } catch (e) {
            camlog('Camera Stop' + e.message, 'err');
            return;
        }

        if (camVideo.readyState >= 1) {
            startSending();
        } else {
            camVideo.addEventListener('loadedmetadata', () => startSending(), { once: true });
        }
    }
</script>

<!-- ================================================================
     BIỂN BÁO từ Java Backend
     ================================================================ -->
<script>
    const signContainer = document.getElementById('signContainer');

    setInterval(() => {
        fetch('/api/current-sign')
            .then(res => res.json())
            .then(data => {
                if (!data || !data.signCode) return;

                const existing = signContainer.querySelector(`[data-code="${data.signCode}"]`);
                if (existing) signContainer.removeChild(existing);

                const img = document.createElement('img');
                img.src = data.image;
                img.dataset.code = data.signCode;
                img.style.cssText = 'width:120px; background:white; padding:5px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.3);';
                signContainer.appendChild(img);

                setTimeout(() => {
                    if (img.parentNode) signContainer.removeChild(img);
                }, 4000);
            })
            .catch(() => {});
    }, 500);
</script>

<!-- ================================================================
     BẢN ĐỒ
     ================================================================ -->
<script>
    let map, vehicleMarker, routeLine, destinationMarker;
    let currentPos = [10.0467, 105.7675];
    let isNavigating = false;
    let autoCenter = true;

    function initMap() {
        map = L.map('leaflet-map', { zoomControl: false }).setView(currentPos, 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        setTimeout(() => map.invalidateSize(), 500);

        const navIcon = L.divIcon({
            className: 'v-marker',
            html: `<div id="vehicle-arrow" style="transform:rotate(0deg); display:flex; justify-content:center; align-items:center;">
                       <i class="fa-solid fa-location-arrow" style="color:#0d6efd; font-size:30px; text-shadow:0 0 10px white;"></i>
                   </div>`,
            iconSize: [30, 30], iconAnchor: [15, 15]
        });

        vehicleMarker = L.marker(currentPos, { icon: navIcon }).addTo(map);
        setupNavigationEvents();
        setupRecenterLogic();
        startGPS();
    }

    function setupRecenterLogic() {
        const recenterBtn = document.getElementById('recenter-btn');
        map.on('dragstart', () => { autoCenter = false; recenterBtn.style.display = 'block'; });
        recenterBtn.onclick = () => {
            autoCenter = true;
            recenterBtn.style.display = 'none';
            map.flyTo(currentPos, isNavigating ? 18 : 16, { animate: true });
        };
    }

    function setupNavigationEvents() {
        const input    = document.getElementById('dest-input');
        const startBtn = document.getElementById('start-nav');

        input.addEventListener('input', function () {
            if (this.value.length > 2) {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(this.value)}&limit=3&countrycodes=vn`)
                    .then(res => res.json())
                    .then(data => {
                        const suggestBox = document.getElementById('suggest-box');
                        suggestBox.innerHTML = '';
                        data.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'list-group-item list-group-item-action border-0 py-3';
                            div.innerText = item.display_name;
                            div.onclick = () => {
                                input.value = item.display_name;
                                suggestBox.innerHTML = '';
                                drawRealRoute(item.lat, item.lon);
                            };
                            suggestBox.appendChild(div);
                        });
                    });
            }
        });

        startBtn.onclick = () => {
            isNavigating = true;
            autoCenter   = true;
            document.getElementById('search-box-ui').style.display = 'none';
            document.getElementById('nav-instruction').style.display = 'block';
            startBtn.style.display = 'none';
            map.flyTo(currentPos, 18, { animate: true, duration: 2 });
            if (routeLine) routeLine.setStyle({ weight: 12, color: '#4285F4', opacity: 1 });
        };
    }

    function drawRealRoute(destLat, destLon) {
        if (routeLine) map.removeLayer(routeLine);
        if (destinationMarker) map.removeLayer(destinationMarker);
        destinationMarker = L.marker([destLat, destLon]).addTo(map);

        const url = `https://router.project-osrm.org/route/v1/driving/${currentPos[1]},${currentPos[0]};${destLon},${destLat}?overview=full&geometries=geojson`;
        fetch(url).then(res => res.json()).then(data => {
            if (data.routes && data.routes.length > 0) {
                const route  = data.routes[0];
                const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
                routeLine = L.polyline(coords, { color: '#4285F4', weight: 8, opacity: 0.7, lineJoin: 'round' }).addTo(map);

                document.getElementById('dist-left').innerText  = (route.distance / 1000).toFixed(1);
                document.getElementById('time-left').innerText  = Math.round(route.duration / 60) + ' phút';
                const arrival = new Date(Date.now() + route.duration * 1000);
                document.getElementById('arrival-time').innerText =
                    arrival.getHours().toString().padStart(2,'0') + ':' +
                    arrival.getMinutes().toString().padStart(2,'0');

                document.getElementById('trip-stats').style.display = 'block';
                map.fitBounds(routeLine.getBounds(), { padding: [60, 100] });
            }
        });
    }

    function startGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, heading } = pos.coords;
            currentPos = [latitude, longitude];
            vehicleMarker.setLatLng(currentPos);
            if (heading !== null) {
                const el = document.getElementById('vehicle-arrow');
                if (el) el.style.transform = `rotate(${heading - 45}deg)`;
            }
            if (autoCenter) map.panTo(currentPos);
        }, null, { enableHighAccuracy: true });
    }

    window.onload = initMap;
</script>
